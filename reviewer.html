<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Code Review Practice</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #1c2128;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --easy:      #2ea043;
    --easy-bg:   #0f2d1c;
    --medium:    #d29922;
    --medium-bg: #2d220a;
    --hard:      #f85149;
    --hard-bg:   #2d0f0f;
    --accent:    #58a6ff;
    --comment-bg:#1b2b3b;
    --comment-border: #1f6feb;
    --found:     #2ea043;
    --partial:   #d29922;
    --missed:    #f85149;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Home ── */
  #home { padding: 40px 48px; max-width: 1100px; margin: 0 auto; }
  .home-header { margin-bottom: 36px; }
  .home-header h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
  .home-header p  { color: var(--muted); font-size: 14px; }
  .home-header p span { color: var(--accent); }

  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
                   text-transform: uppercase; color: var(--muted); margin: 28px 0 12px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 18px 20px; cursor: pointer; transition: border-color .15s, transform .1s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-top { display: flex; align-items: center; justify-content: space-between; }
  .level-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .easy-badge   { background: var(--easy-bg);   color: var(--easy);   border: 1px solid var(--easy); }
  .medium-badge { background: var(--medium-bg); color: var(--medium); border: 1px solid var(--medium); }
  .hard-badge   { background: var(--hard-bg);   color: var(--hard);   border: 1px solid var(--hard); }
  .issue-count  { font-size: 11px; color: var(--muted); }
  .card-title   { font-size: 14px; font-weight: 500; line-height: 1.4; }
  .card-topics  { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .card-status  { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .status-done  { color: var(--easy); }

  /* ── Review View ── */
  #review { display: none; flex-direction: column; height: 100vh; }
  .review-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .back-btn {
    background: none; border: 1px solid var(--border); color: var(--text);
    padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .review-title { font-size: 15px; font-weight: 600; flex: 1; }
  .review-meta  { font-size: 13px; color: var(--muted); }
  .submit-btn {
    background: var(--accent); color: #fff; border: none; padding: 7px 18px;
    border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .submit-btn:hover { background: #79b8ff; }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; }

  .review-body { display: flex; flex: 1; overflow: hidden; }

  /* ── Code Panel ── */
  .code-panel { flex: 1; overflow-y: auto; background: var(--surface); }
  .code-file-header {
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--muted); background: var(--surface2);
    display: flex; align-items: center; gap: 8px;
  }
  .code-file-header span { color: var(--text); font-weight: 500; }

  .code-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.6; }
  .code-table tr { position: relative; }
  .code-table tr:hover .add-comment-btn { opacity: 1; }
  .code-table tr.has-comment { background: rgba(31,111,235,.05); }
  .line-num {
    width: 52px; text-align: right; padding: 0 12px 0 16px;
    color: var(--muted); user-select: none; vertical-align: top;
    border-right: 1px solid var(--border); white-space: nowrap; position: relative;
  }
  .line-code { padding: 0 16px; white-space: pre; vertical-align: top; }
  .line-code .hljs { background: transparent; padding: 0; font-size: 13px; }

  .add-comment-btn {
    position: absolute; left: -14px; top: 2px; opacity: 0; width: 20px; height: 20px;
    background: var(--accent); border: none; border-radius: 50%; cursor: pointer;
    font-size: 13px; font-weight: 700; color: #fff; line-height: 20px; text-align: center;
    transition: opacity .1s; z-index: 10;
  }

  /* inline comment form row */
  .comment-form-row td { padding: 0 !important; }
  .comment-form-wrap {
    border-top: 2px solid var(--comment-border); border-bottom: 2px solid var(--comment-border);
    background: var(--comment-bg); padding: 12px 16px;
  }
  .comment-form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .comment-form-label strong { color: var(--accent); }
  .comment-textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; padding: 8px 12px;
    resize: vertical; min-height: 80px; font-family: inherit; outline: none;
  }
  .comment-textarea:focus { border-color: var(--accent); }
  .comment-form-actions { margin-top: 8px; display: flex; gap: 8px; }
  .save-comment-btn {
    background: var(--accent); color: #fff; border: none; padding: 5px 14px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .cancel-comment-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }

  /* saved comment thread row */
  .comment-thread-row td { padding: 0 !important; }
  .comment-thread-wrap {
    border-left: 3px solid var(--comment-border); background: var(--comment-bg);
    padding: 10px 16px; display: flex; gap: 10px;
  }
  .comment-avatar {
    width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    font-weight: 600; color: #fff; flex-shrink: 0; margin-top: 2px;
  }
  .comment-body-wrap { flex: 1; }
  .comment-author { font-size: 12px; font-weight: 600; color: var(--accent); }
  .comment-line-ref { font-size: 11px; color: var(--muted); margin-left: 6px; }
  .comment-text { font-size: 13px; color: var(--text); margin-top: 4px; line-height: 1.5; }
  .comment-delete { margin-left: auto; background: none; border: none; color: var(--muted);
                    cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 4px; }
  .comment-delete:hover { color: var(--hard); background: var(--hard-bg); }

  /* ── Results Panel ── */
  #results { display: none; flex-direction: column; height: 100vh; }
  .results-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .results-body { flex: 1; overflow-y: auto; padding: 32px 40px; max-width: 860px; margin: 0 auto; width: 100%; }
  .score-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 24px 28px; margin-bottom: 28px; display: flex; align-items: center; gap: 28px;
  }
  .score-ring { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-text {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-pct { font-size: 22px; font-weight: 700; }
  .score-label { font-size: 11px; color: var(--muted); }
  .score-info h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .score-info p  { font-size: 13px; color: var(--muted); }
  .score-breakdown { display: flex; gap: 20px; margin-top: 12px; }
  .score-stat { font-size: 13px; }
  .score-stat span { font-weight: 600; }
  .found-count   { color: var(--found);   }
  .partial-count { color: var(--partial); }
  .missed-count  { color: var(--missed);  }

  .issues-list { display: flex; flex-direction: column; gap: 12px; }
  .issue-result {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 18px;
  }
  .issue-result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .issue-status-icon { font-size: 18px; flex-shrink: 0; }
  .issue-result-title { font-size: 14px; font-weight: 600; flex: 1; }
  .issue-severity {
    font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
  }
  .sev-critical { background: #2d0f0f; color: #f85149; border: 1px solid #f85149; }
  .sev-high     { background: #2d1a00; color: #e3803a; border: 1px solid #e3803a; }
  .sev-medium   { background: var(--medium-bg); color: var(--medium); border: 1px solid var(--medium); }
  .sev-low      { background: var(--easy-bg);   color: var(--easy);   border: 1px solid var(--easy); }

  .issue-explanation { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .issue-explanation strong { color: var(--text); }
  .your-comment-box {
    background: var(--comment-bg); border-left: 3px solid var(--comment-border);
    border-radius: 0 6px 6px 0; padding: 8px 12px; margin-top: 10px;
    font-size: 12px; color: var(--muted);
  }
  .your-comment-box p { font-size: 13px; color: var(--text); margin-top: 3px; font-style: italic; }
  .keywords-matched { font-size: 12px; margin-top: 6px; color: var(--muted); }
  .kw-chip {
    display: inline-block; background: rgba(88,166,255,.15); color: var(--accent);
    border: 1px solid rgba(88,166,255,.3); border-radius: 4px; padding: 1px 6px;
    margin: 2px; font-size: 11px;
  }
  .tip-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; margin-top: 10px; font-size: 12px; color: var(--muted);
  }
  .tip-box strong { color: var(--accent); }

  .retry-btn {
    background: none; border: 1px solid var(--accent); color: var(--accent);
    padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .retry-btn:hover { background: rgba(88,166,255,.1); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 700px) { .cards { grid-template-columns: 1fr; } #home { padding: 24px 20px; } }
</style>
</head>
<body>

<!-- ═══════════════ HOME ═══════════════ -->
<div id="home">
  <div class="home-header">
    <h1>Java Code Review Practice</h1>
    <p>Pick a snippet, review it like a real PR. Click <span>+</span> next to any line to add a comment, then hit <span>Submit Review</span> to get scored.</p>
  </div>
  <div id="snippet-grid"></div>
</div>

<!-- ═══════════════ REVIEW ═══════════════ -->
<div id="review">
  <div class="review-header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="review-title" id="review-title">—</div>
    <div class="review-meta" id="review-meta">0 comments</div>
    <button class="submit-btn" id="submit-btn" onclick="submitReview()">Submit Review</button>
  </div>
  <div class="review-body">
    <div class="code-panel" id="code-panel">
      <div class="code-file-header">📄 <span id="code-filename">—</span></div>
      <table class="code-table" id="code-table"><tbody id="code-body"></tbody></table>
    </div>
  </div>
</div>

<!-- ═══════════════ RESULTS ═══════════════ -->
<div id="results">
  <div class="results-header">
    <button class="back-btn" onclick="goHome()">← All Snippets</button>
    <div class="review-title" id="results-title">Review Results</div>
    <button class="retry-btn" onclick="retrySnippet()">Try Again</button>
  </div>
  <div class="results-body" id="results-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SNIPPET DATA
// ═══════════════════════════════════════════════════════════════

const SNIPPETS = [
{
  id: 'easy-01', level: 'Easy', title: 'String Comparison & Resource Handling',
  topics: 'String ==, unclosed resource, O(n²) concatenation',
  filename: 'Easy01_StringAndResources.java',
  code: `import java.io.*;
import java.util.*;

public class OrderService {

    private static final String ROLE_ADMIN = "ADMIN";

    public boolean isKeyValid(String filePath, String inputKey) throws Exception {
        FileInputStream fis = new FileInputStream(filePath);
        BufferedReader reader = new BufferedReader(new InputStreamReader(fis));

        String storedKey = reader.readLine();

        if (storedKey == inputKey) {
            return true;
        }
        return false;
    }

    public boolean isAdmin(User user) {
        String role = user.getRole();
        if (role == ROLE_ADMIN) {
            return true;
        }
        return false;
    }

    public String buildOrderSummary(List<String> orderIds) {
        String summary = "";
        for (String id : orderIds) {
            summary = summary + id + ", ";
        }
        return summary;
    }
}`,
  issues: [
    { title: 'Unclosed Resource — FileInputStream & BufferedReader',
      lines: [9,10], severity: 'high',
      keywords: ['close','resource','try-with','autocloseable','finally','stream','leak','fis','reader'],
      fix: 'Wrap in try-with-resources. Both FileInputStream and BufferedReader implement AutoCloseable — they are closed automatically even if an exception is thrown.',
      commentTemplate: '"fis and reader are opened but never closed. If readLine() throws, both streams leak. Suggest wrapping in try-with-resources."'
    },
    { title: 'String Compared with == Instead of .equals()',
      lines: [14,21], severity: 'medium',
      keywords: ['equals','==','reference','identity','intern','content','.equals'],
      fix: 'Use .equals() or Objects.equals(). The == operator checks reference identity, not content. Strings from I/O, DBs, or new String() are never interned.',
      commentTemplate: '"storedKey == inputKey compares object references, not string content. Will silently fail for strings from file I/O. Use Objects.equals(storedKey, inputKey)."'
    },
    { title: 'String Concatenation in Loop — O(n²)',
      lines: [29,30], severity: 'medium',
      keywords: ['stringbuilder','o(n','performance','immutable','copy','loop','quadratic','n2','n²','inefficient','concat'],
      fix: 'Use StringBuilder.append() or String.join(", ", orderIds). Each += creates a new String object copying all previous content — O(n²) total work.',
      commentTemplate: '"String += in a loop is O(n²) — every iteration copies the entire string built so far. Suggest String.join(\\", \\", orderIds)."'
    }
  ]
},
{
  id: 'easy-02', level: 'Easy', title: 'Null Handling & Magic Numbers',
  topics: 'NPE on return value, chained NPE, magic numbers',
  filename: 'Easy02_NullAndMagicNumbers.java',
  code: `import java.util.*;
import java.util.concurrent.TimeUnit;

public class UserService {

    public String getDisplayName(User user) {
        String name = userRepository.findDisplayName(user.getId()); // can return null
        return name.toUpperCase();   // <-- potential NPE
    }

    public String getUserCity(String userId) {
        return userService.getUser(userId)
                          .getProfile()
                          .getAddress()
                          .getCity();
    }

    public boolean shouldLockAccount(User user) {
        return user.getFailedAttempts() >= 5;
    }

    public boolean isSessionExpired(long lastActivityMs) {
        return System.currentTimeMillis() - lastActivityMs > 1800000;
    }
}`,
  issues: [
    { title: 'NPE — Unconsumed Nullable Return Value',
      lines: [7,8], severity: 'high',
      keywords: ['null','npe','nullpointer','check','optional','guard','nullable'],
      fix: 'Guard before calling .toUpperCase(). The repository can return null (documented above), and calling a method on null throws NPE. Use Optional.ofNullable(name).map(String::toUpperCase).orElse("Anonymous") or a null check.',
      commentTemplate: '"findDisplayName() can return null but the result is immediately dereferenced with .toUpperCase() — NPE for any user without a display name. Suggest Optional or a null check."'
    },
    { title: 'NPE — Chained Method Calls Without Null Checks',
      lines: [11,12,13,14], severity: 'high',
      keywords: ['null','chain','npe','optional','map','getUser','getProfile','getAddress','getCity'],
      fix: 'Use Optional.map() to flatten the chain safely. Any of the four calls can return null; Optional.map() short-circuits to Optional.empty() instead of throwing.',
      commentTemplate: '"This chain has four consecutive calls. getUser(), getProfile(), getAddress(), or getCity() can each return null — the NPE won\'t tell you which step failed. Suggest Optional.map() chain."'
    },
    { title: 'Magic Number — Lockout Threshold (5)',
      lines: [18], severity: 'low',
      keywords: ['magic','constant','named','literal','5','threshold','lockout','final'],
      fix: 'Extract to: private static final int MAX_FAILED_LOGIN_ATTEMPTS = 5; — self-documenting, single place to change.',
      commentTemplate: '"The literal 5 is a magic number. A reader cannot tell this is the lockout threshold without context. Suggest a named constant MAX_FAILED_LOGIN_ATTEMPTS."'
    },
    { title: 'Magic Number — Session Timeout (1800000)',
      lines: [22], severity: 'low',
      keywords: ['magic','constant','named','literal','1800000','timeunit','minutes','timeout','30'],
      fix: 'Use TimeUnit.MINUTES.toMillis(30) and assign to SESSION_TIMEOUT_MS. 1800000 is not self-documenting; the intent is invisible to the reader.',
      commentTemplate: '"1800000 ms = 30 minutes, but a reader cannot tell that at a glance. Suggest TimeUnit.MINUTES.toMillis(30) assigned to SESSION_TIMEOUT_MS."'
    }
  ]
},
{
  id: 'easy-03', level: 'Easy', title: 'Exception Handling & Code Duplication',
  topics: 'Catch-all, empty catch, unclosed resource, DRY violation',
  filename: 'Easy03_ExceptionAndDuplication.java',
  code: `import java.io.*;
import java.util.*;

public class UserService {

    public User loadUser(String userId) {
        try {
            return userRepository.findById(userId);
        } catch (Exception e) {
            return null;
        }
    }

    public void saveReport(String content, String path) {
        try {
            FileWriter writer = new FileWriter(new File(path));
            writer.write(content);
            writer.close();
        } catch (IOException e) {
        }
    }

    public void registerUser(String email, String password) {
        if (email == null || !email.contains("@") || email.length() > 255) {
            throw new ValidationException("Invalid email");
        }
        if (password == null || password.length() < 8) {
            throw new ValidationException("Password too short");
        }
        userRepository.create(email, password);
    }

    public void updateEmail(String userId, String newEmail) {
        if (newEmail == null || !newEmail.contains("@") || newEmail.length() > 255) {
            throw new ValidationException("Invalid email");
        }
        userRepository.updateEmail(userId, newEmail);
    }

    public void resetPassword(String userId, String newPassword) {
        if (newPassword == null || newPassword.length() < 8) {
            throw new ValidationException("Password too short");
        }
        userRepository.updatePassword(userId, newPassword);
    }
}`,
  issues: [
    { title: 'Catching Too Broadly + Returning null',
      lines: [9,10], severity: 'high',
      keywords: ['exception','broad','swallow','null','specific','catch','hide','mask','log','rethrow'],
      fix: 'Catch only the specific checked exception (e.g. DatabaseException), log with context (userId), and rethrow as a domain exception. catch(Exception) swallows NPEs and programming bugs.',
      commentTemplate: '"catch(Exception) swallows all errors — NPEs, programming bugs included — and silently returns null. The root cause is permanently lost. Catch the specific DB exception, log it, rethrow."'
    },
    { title: 'Empty catch Block — Silent Failure',
      lines: [19,20], severity: 'high',
      keywords: ['empty','swallow','silent','catch','log','exception','ignore'],
      fix: 'Log the IOException and rethrow (or wrap). An empty catch means a failed write produces no error, no log — completely invisible in production.',
      commentTemplate: '"Empty catch block — if write() fails, there is zero indication. No log, no rethrow. The file is silently not saved. Always at minimum log the exception with context."'
    },
    { title: 'Unclosed FileWriter on Exception Path',
      lines: [15,16,17], severity: 'medium',
      keywords: ['close','resource','try-with','writer','leak','exception','autocloseable'],
      fix: 'Use try-with-resources. If writer.write() throws, writer.close() at line 17 is never called — FileWriter leaks. try-with-resources guarantees close() runs.',
      commentTemplate: '"If writer.write() throws, writer.close() at line 17 is skipped — FileWriter leaks. Use try-with-resources to guarantee cleanup on all paths."'
    },
    { title: 'Email Validation Logic Duplicated (DRY violation)',
      lines: [23,24,33,34], severity: 'medium',
      keywords: ['duplicate','dry','repeat','extract','method','validation','copy','refactor'],
      fix: 'Extract into a private validateEmail() method called from both registerUser() and updateEmail(). If the email rule changes, you currently have to update two places — and will miss one.',
      commentTemplate: '"Email validation is copy-pasted in registerUser() and updateEmail(). If the rule changes (e.g. max length → 320), it must be updated in two places. Extract into validateEmail()."'
    }
  ]
},
{
  id: 'medium-01', level: 'Medium', title: 'equals()/hashCode() Contract & Immutability',
  topics: 'Missing hashCode, broken Map lookups, exposed internal state',
  filename: 'Medium01_EqualsHashCodeAndImmutability.java',
  code: `import java.util.*;

class TradeKey {
    private String symbol;
    private String tradeDate;

    public TradeKey(String symbol, String tradeDate) {
        this.symbol    = symbol;
        this.tradeDate = tradeDate;
    }

    @Override
    public boolean equals(Object o) {
        if (!(o instanceof TradeKey)) return false;
        TradeKey other = (TradeKey) o;
        return Objects.equals(symbol, other.symbol) &&
               Objects.equals(tradeDate, other.tradeDate);
    }

    // hashCode() NOT overridden — Object.hashCode() is used
}

class TradeCache {
    private final Map<TradeKey, Double> priceCache = new HashMap<>();
    private final List<String>          auditLog   = new ArrayList<>();

    public void cachePrice(TradeKey key, double price) {
        priceCache.put(key, price);
    }

    public boolean isCached(TradeKey key) {
        return priceCache.containsKey(key);
    }

    public void removePrice(TradeKey key) {
        priceCache.remove(key);
    }

    public List<String> getAuditLog() {
        return auditLog;
    }
}

class RateLimiter {
    private final int  maxRequests;
    private final long windowMs;
    private int  requestCount = 0;        // plain int — not thread-safe
    private long windowStart  = System.currentTimeMillis();

    public boolean allow() {
        long now = System.currentTimeMillis();
        if (now - windowStart > windowMs) {
            windowStart   = now;
            requestCount  = 0;            // non-atomic reset
        }
        requestCount++;
        return requestCount <= maxRequests;
    }
}

class CircuitBreaker {
    enum State { CLOSED, OPEN, HALF_OPEN }

    private State state        = State.CLOSED;
    private int   failureCount = 0;
    private long  openedAt     = 0;

    private static final int  THRESHOLD   = 5;
    private static final long RECOVERY_MS = 30_000;

    public boolean isOpen() {
        if (state == State.OPEN && System.currentTimeMillis() - openedAt > RECOVERY_MS) {
            state = State.HALF_OPEN;      // non-atomic check-then-act
        }
        return state == State.OPEN;
    }

    public void recordSuccess() { failureCount = 0; state = State.CLOSED; }

    public void recordFailure() {
        failureCount++;
        if (failureCount >= THRESHOLD) {
            state    = State.OPEN;
            openedAt = System.currentTimeMillis();
        }
    }
}

class RetryablePaymentService {

    public PaymentResult chargeWithRetry(PaymentRequest req, int maxRetries) {
        int attempts = 0;
        while (attempts < maxRetries) {
            try {

            } catch (PaymentException e) {
                attempts++;
                if (attempts == maxRetries) throw e;
            }
        }
        return null;    // "unreachable" — but what if logic changes?
    }

// STATE
// ═══════════════════════════════════════════════════════════════

let currentSnippet = null;
let comments = [];           // { lineNum, text }
let activeFormLine = null;
let completedSnippets = {};  // id -> { score, total }

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════

function renderHome() {
  const grid = document.getElementById('snippet-grid');
  const levels = ['Easy','Medium','Hard'];
  let html = '';
  levels.forEach(level => {
    const snips = SNIPPETS.filter(s => s.level === level);
    const cls = level.toLowerCase();
    html += `<div class="section-label">${level}</div><div class="cards">`;
    snips.forEach(s => {
      const done = completedSnippets[s.id];
      const pct = done ? Math.round((done.score / done.total) * 100) : null;
      html += `<div class="card" onclick="openSnippet('${s.id}')">
        <div class="card-top">
          <span class="level-badge ${cls}-badge">${level}</span>
          <span class="issue-count">${s.issues.length} issues</span>
        </div>
        <div class="card-title">${s.title}</div>
        <div class="card-topics">${s.topics}</div>
        <div class="card-status ${done ? 'status-done' : ''}">
          ${done ? `✓ Reviewed — ${pct}% (${done.score}/${done.total} pts)` : 'Not reviewed yet'}
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  grid.innerHTML = html;
}

function goHome() {
  document.getElementById('review').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  renderHome();
}

// ═══════════════════════════════════════════════════════════════
// CODE VIEW
// ═══════════════════════════════════════════════════════════════

function openSnippet(id) {
  currentSnippet = SNIPPETS.find(s => s.id === id);
  comments = [];
  activeFormLine = null;

  document.getElementById('home').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  const rev = document.getElementById('review');
  rev.style.display = 'flex';

  document.getElementById('review-title').textContent = currentSnippet.title;
  document.getElementById('code-filename').textContent = currentSnippet.filename;
  updateCommentCount();
  renderCode();
}

function retrySnippet() {
  openSnippet(currentSnippet.id);
}

function renderCode() {
  const lines = currentSnippet.code.split('\n');
  const tbody = document.getElementById('code-body');
  tbody.innerHTML = '';

  lines.forEach((line, i) => {
    const lineNum = i + 1;
    const hasComment = comments.some(c => c.lineNum === lineNum);

    // Code row
    const tr = document.createElement('tr');
    tr.id = `line-${lineNum}`;
    tr.className = hasComment ? 'has-comment' : '';
    tr.innerHTML = `
      <td class="line-num">
        <button class="add-comment-btn" onclick="toggleCommentForm(${lineNum})">+</button>
        ${lineNum}
      </td>
      <td class="line-code"><code class="language-java">${escapeHtml(line)}</code></td>`;
    tbody.appendChild(tr);

    // Insert comment form if active
    if (activeFormLine === lineNum) {
      const formTr = document.createElement('tr');
      formTr.className = 'comment-form-row';
      formTr.id = `form-row-${lineNum}`;
      formTr.innerHTML = `<td colspan="2">
        <div class="comment-form-wrap">
          <div class="comment-form-label">Comment on <strong>line ${lineNum}</strong></div>
          <textarea class="comment-textarea" id="comment-input-${lineNum}"
            placeholder="Describe the issue: What is wrong? Why is it a problem? How would you fix it?"
            onkeydown="handleCommentKey(event, ${lineNum})"></textarea>
          <div class="comment-form-actions">
            <button class="save-comment-btn" onclick="saveComment(${lineNum})">Save Comment</button>
            <button class="cancel-comment-btn" onclick="cancelForm()">Cancel</button>
          </div>
        </div>
      </td>`;
      tbody.appendChild(formTr);
    }

    // Insert saved comments for this line
    const lineComments = comments.filter(c => c.lineNum === lineNum);
    lineComments.forEach((c, ci) => {
      const threadTr = document.createElement('tr');
      threadTr.className = 'comment-thread-row';
      threadTr.id = `comment-row-${c.id}`;
      threadTr.innerHTML = `<td colspan="2">
        <div class="comment-thread-wrap">
          <div class="comment-avatar">Y</div>
          <div class="comment-body-wrap">
            <span class="comment-author">Your Review</span>
            <span class="comment-line-ref">· line ${lineNum}</span>
            <div class="comment-text">${escapeHtml(c.text)}</div>
          </div>
          <button class="comment-delete" onclick="deleteComment('${c.id}')">✕</button>
        </div>
      </td>`;
      tbody.appendChild(threadTr);
    });
  });

  // Syntax highlight
  document.querySelectorAll('#code-body code').forEach(el => hljs.highlightElement(el));
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleCommentForm(lineNum) {
  if (activeFormLine === lineNum) {
    activeFormLine = null;
  } else {
    activeFormLine = lineNum;
  }
  renderCode();
  if (activeFormLine) {
    const ta = document.getElementById(`comment-input-${lineNum}`);
    if (ta) ta.focus();
  }
}

function cancelForm() {
  activeFormLine = null;
  renderCode();
}

function handleCommentKey(e, lineNum) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) saveComment(lineNum);
  if (e.key === 'Escape') cancelForm();
}

function saveComment(lineNum) {
  const ta = document.getElementById(`comment-input-${lineNum}`);
  const text = ta ? ta.value.trim() : '';
  if (!text) return;
  comments.push({ id: `c-${Date.now()}-${lineNum}`, lineNum, text });
  activeFormLine = null;
  updateCommentCount();
  renderCode();
}

function deleteComment(id) {
  comments = comments.filter(c => c.id !== id);
  updateCommentCount();
  renderCode();
}

function updateCommentCount() {
  document.getElementById('review-meta').textContent =
    comments.length === 0 ? 'No comments yet' :
    comments.length === 1 ? '1 comment' : `${comments.length} comments`;
}

// ═══════════════════════════════════════════════════════════════
// EVALUATION
// ═══════════════════════════════════════════════════════════════

function submitReview() {
  if (comments.length === 0) {
    alert('Add at least one comment before submitting!');
    return;
  }

  const s = currentSnippet;
  let totalPts = 0;
  let earnedPts = 0;
  const results = [];

  s.issues.forEach(issue => {
    totalPts += 2;
    const nearby = comments.filter(c => issue.lines.some(l => Math.abs(c.lineNum - l) <= 3));
    let matched = [];
    let bestComment = null;
    let pts = 0;

    if (nearby.length > 0) {
      nearby.forEach(c => {
        const lower = c.text.toLowerCase();
        const m = issue.keywords.filter(kw => lower.includes(kw.toLowerCase()));
        if (m.length > matched.length) { matched = m; bestComment = c; }
      });

      if (matched.length >= 2) { pts = 2; }
      else if (matched.length === 1) { pts = 1; }
      else { pts = 1; } // comment existed near the issue — partial credit for finding the area
    }

    earnedPts += pts;
    results.push({ issue, pts, bestComment, matched });
  });

  completedSnippets[s.id] = { score: earnedPts, total: totalPts };
  showResults(results, earnedPts, totalPts);
}

function showResults(results, earned, total) {
  document.getElementById('review').style.display = 'none';
  const res = document.getElementById('results');
  res.style.display = 'flex';
  document.getElementById('results-title').textContent = currentSnippet.title + ' — Results';

  const pct = Math.round((earned / total) * 100);
  const found   = results.filter(r => r.pts === 2).length;
  const partial = results.filter(r => r.pts === 1).length;
  const missed  = results.filter(r => r.pts === 0).length;

  const grade = pct >= 90 ? '🏆 Excellent' : pct >= 70 ? '✅ Good' : pct >= 50 ? '⚠️ Needs Work' : '❌ Keep Practicing';
  const msg = pct >= 90 ? 'Outstanding review — you caught everything with clear explanations.' :
              pct >= 70 ? 'Solid review — you found the major issues.' :
              pct >= 50 ? 'You caught some issues but missed a few important ones.' :
              'Review the answer file carefully and try again.';

  const circleLen = 2 * Math.PI * 34;
  const circleOffset = circleLen * (1 - earned / total);
  const circleColor = pct >= 70 ? '#2ea043' : pct >= 50 ? '#d29922' : '#f85149';

  let html = `
  <div class="score-card">
    <div class="score-ring">
      <svg width="88" height="88" viewBox="0 0 88 88">
        <circle cx="44" cy="44" r="34" fill="none" stroke="#30363d" stroke-width="6"/>
        <circle cx="44" cy="44" r="34" fill="none" stroke="${circleColor}" stroke-width="6"
          stroke-dasharray="${circleLen}" stroke-dashoffset="${circleOffset}"
          stroke-linecap="round"/>
      </svg>
      <div class="score-ring-text">
        <span class="score-pct" style="color:${circleColor}">${pct}%</span>
        <span class="score-label">${earned}/${total}</span>
      </div>
    </div>
    <div class="score-info">
      <h2>${grade}</h2>
      <p>${msg}</p>
      <div class="score-breakdown">
        <div class="score-stat"><span class="found-count">${found}</span> fully found</div>
        <div class="score-stat"><span class="partial-count">${partial}</span> partial</div>
        <div class="score-stat"><span class="missed-count">${missed}</span> missed</div>
      </div>
    </div>
  </div>
  <div class="issues-list">`;

  results.forEach((r, i) => {
    const icon = r.pts === 2 ? '✅' : r.pts === 1 ? '🟡' : '❌';
    const statusLabel = r.pts === 2 ? 'Found' : r.pts === 1 ? 'Partial' : 'Missed';
    const statusColor = r.pts === 2 ? 'var(--found)' : r.pts === 1 ? 'var(--partial)' : 'var(--missed)';
    const sevCls = { critical:'sev-critical', high:'sev-high', medium:'sev-medium', low:'sev-low' }[r.issue.severity] || 'sev-low';

    html += `
    <div class="issue-result">
      <div class="issue-result-header">
        <span class="issue-status-icon">${icon}</span>
        <span class="issue-result-title">Issue ${i+1}: ${r.issue.title}</span>
        <span style="font-size:12px;color:${statusColor};font-weight:600">${statusLabel}</span>
        <span class="issue-severity ${sevCls}">${r.issue.severity.toUpperCase()}</span>
      </div>
      <div class="issue-explanation"><strong>Why it matters:</strong> ${r.issue.fix}</div>`;

    if (r.bestComment) {
      html += `<div class="your-comment-box">
        Your comment on line ${r.bestComment.lineNum}:
        <p>"${escapeHtml(r.bestComment.text)}"</p>`;
      if (r.matched.length > 0) {
        html += `<div class="keywords-matched">Key concepts mentioned: ${r.matched.map(k => `<span class="kw-chip">${k}</span>`).join('')}</div>`;
      }
      html += `</div>`;
    }

    if (r.pts < 2) {
      html += `<div class="tip-box"><strong>Strong comment example:</strong> ${r.issue.commentTemplate}</div>`;
    }
    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById('results-body').innerHTML = html;
  document.getElementById('results-body').scrollTop = 0;
}

// ═══════════════════════════════════════════════════════════════
renderHome();
</script>
